# Base Prometheus configuration
# Self-monitoring scrape jobs are defined here.
# Additional scrape configs can be provided via:
#   - Secret file: /etc/prometheus/scrape_configs.yml (recommended for production)
#   - Environment variable: EXTRA_SCRAPE_TARGETS (JSON array, see entrypoint.sh)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: 'production'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Loki, OTel Collector, and Grafana metrics are pushed via remote write
  # from the OTel Collector (which scrapes them internally) rather than
  # scraped directly, since Render internal hostports only expose one port
  # per service and the metrics ports differ from the primary service port.
