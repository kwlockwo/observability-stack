projects:
  - name: Observability
    environments:
      - name: Observability
        services:
          # Loki - Log Aggregation (private)
          - type: pserv
            name: loki
            runtime: docker
            dockerfilePath: ./loki/Dockerfile
            dockerContext: ./loki
            plan: starter
            buildFilter:
              paths:
                - loki/**
            envVars:
              - key: LOKI_VERSION
                value: 3.3.2
            disk:
              name: loki-data
              mountPath: /loki
              sizeGB: 10

          # Prometheus - Metrics (private)
          - type: pserv
            name: prometheus
            runtime: docker
            dockerfilePath: ./prometheus/Dockerfile
            dockerContext: ./prometheus
            plan: starter
            buildFilter:
              paths:
                - prometheus/**
            envVars:
              - key: PROMETHEUS_VERSION
                value: v3.2.1
              - key: LOKI_HOST
                fromService:
                  name: loki
                  type: pserv
                  property: hostport
              - key: OTEL_COLLECTOR_HOST
                fromService:
                  name: otel-collector
                  type: web
                  property: hostport
              - key: GRAFANA_HOST
                fromService:
                  name: grafana
                  type: web
                  property: hostport
              # Optional: JSON array of extra scrape targets.
              # Example: [{"job_name":"my-app","targets":["my-app.onrender.com:443"]}]
              # Prefer mounting a secret file at /etc/secrets/scrape_configs.yml instead.
              - key: EXTRA_SCRAPE_TARGETS
                value: ""
            disk:
              name: prometheus-data
              mountPath: /prometheus
              sizeGB: 10

          # Grafana - Observability Dashboard
          - type: web
            name: grafana
            runtime: docker
            dockerfilePath: ./grafana/Dockerfile
            dockerContext: ./grafana
            plan: starter
            buildFilter:
              paths:
                - grafana/**
            envVars:
              - key: GRAFANA_VERSION
                value: 11.4.0
              - key: GF_SECURITY_ADMIN_PASSWORD
                generateValue: true
              - key: GF_AUTH_ANONYMOUS_ENABLED
                value: "false"
              - key: PROMETHEUS_HOST
                fromService:
                  name: prometheus
                  type: pserv
                  property: hostport
              - key: LOKI_HOST
                fromService:
                  name: loki
                  type: pserv
                  property: hostport
            disk:
              name: grafana-data
              mountPath: /var/lib/grafana
              sizeGB: 1

          # OpenTelemetry Collector - Telemetry ingestion
          - type: web
            name: otel-collector
            runtime: docker
            dockerfilePath: ./otel-collector/Dockerfile
            dockerContext: ./otel-collector
            plan: starter
            buildFilter:
              paths:
                - otel-collector/**
            envVars:
              - key: OTEL_VERSION
                value: 0.120.0
              # LOKI_HOST and PROMETHEUS_HOST are host:port strings provided by Render.
              # The entrypoint constructs the full URLs (scheme + path) from these.
              - key: LOKI_HOST
                fromService:
                  name: loki
                  type: pserv
                  property: hostport
              - key: PROMETHEUS_HOST
                fromService:
                  name: prometheus
                  type: pserv
                  property: hostport
              # Optional: extra OTel Collector config — mount a secret file at
              # /etc/secrets/otelcol_extra.yaml on this service in the Render dashboard.
              - key: OTEL_LOG_LEVEL
                value: "info"
              - key: OTEL_EXTRA_CONFIG
                value: ""
            healthCheckPath: /
            disk:
              name: otel-collector-data
              mountPath: /var/lib/otelcol
              sizeGB: 1
